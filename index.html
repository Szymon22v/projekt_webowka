<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Znany Lekarz</title>

    <!-- Bootstrap tylko do layoutu (opcjonalnie możesz usunąć całkiem) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="text-center">
      <h1 class="title mb-4">Znany Lekarz</h1>

      <form class="p-4 border rounded bg-white" style="min-width: 300px" method="POST" action="login.php">
        <div class="mb-3 text-start">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required />
        </div>

        <div class="mb-3 text-start">
          <label for="password" class="form-label">Hasło</label>
          <input type="password" class="form-control" id="password" name="password" required />
        </div>

        <div class="mb-3 form-check text-start">
          <input type="checkbox" class="form-check-input" id="remember" name="remember" />
          <label class="form-check-label" for="remember">
            Zapamiętaj mnie
          </label>
        </div>

        <button type="submit" class="custom-btn login-btn">Zaloguj się</button>

        <p class="text-center mt-3 mb-2">Nie masz konta?</p>

        <a href="register.html" class="custom-btn register-btn d-inline-block" style="text-decoration: none;">
          Zarejestruj się
        </a>
      </form>
    </div>
  </body>
</html>
