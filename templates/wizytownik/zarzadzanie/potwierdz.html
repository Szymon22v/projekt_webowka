{% extends "base.html" %}
{% block title %}Potwierdzenie{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 500px">
    <div class="card border-0 shadow-sm border-top border-danger border-3">
        <div class="card-body p-4 text-center">
            <i class="fa-solid fa-triangle-exclamation fa-3x text-danger mb-3"></i>
            <h4 class="fw-bold">Czy na pewno?</h4>
            <p class="text-muted">Zamierzasz dezaktywować {{ typ }}: <strong>{{ obiekt }}</strong></p>
            <form method="POST" class="d-flex gap-3 justify-content-center mt-4">
                {% csrf_token %}
                <a href="{% url powrot %}" class="btn btn-outline-secondary px-4">Anuluj</a>
                <button type="submit" class="btn btn-danger px-4">
                    <i class="fa-solid fa-check me-1"></i>Tak, dezaktywuj
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
