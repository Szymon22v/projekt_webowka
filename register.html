<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rejestracja - Znany Lekarz</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="text-center">
      <h1 class="title mb-4">Rejestracja</h1>

      <form class="p-4 border rounded bg-white" style="min-width: 300px">
        <div class="mb-3 text-start">
          <label for="firstName" class="form-label">Imię</label>
          <input type="text" class="form-control" id="firstName" required />
        </div>

        <div class="mb-3 text-start">
          <label for="lastName" class="form-label">Nazwisko</label>
          <input type="text" class="form-control" id="lastName" required />
        </div>

        <div class="mb-3 text-start">
          <label for="mail" class="form-label">Email</label>
          <input type="email" class="form-control" id="mail" />
        </div>

        <div class="mb-3 text-start">
          <label for="password" class="form-label">Hasło</label>
          <input type="password" class="form-control" id="password" required />
        </div>

        <div class="mb-3 text-start">
          <label for="confirmPassword" class="form-label"
            >Potwierdź hasło</label
          >
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            required
          />
        </div>

        <div class="mb-3 form-check text-start">
          <input type="checkbox" class="form-check-input" id="terms" required />
          <label class="form-check-label" for="terms">
            Akceptuję regulamin
          </label>
        </div>

        <button type="button" class="custom-btn login-btn w-100">
          Stwórz konto
        </button>
      </form>
    </div>
  </body>
</html>
